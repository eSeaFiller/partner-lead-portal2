services:
  partner-lead-portal:
    build: .
    ports:
      - "8787:8787"
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      ADMIN_AUTH_DISABLED: "1"
      LEAD_DATA_DIR: /data/leads
      LEAD_EXPORT_DIR: /data/exports
    volumes:
      - partner_lead_data:/data
    restart: unless-stopped

volumes:
  partner_lead_data:
