services:
  - type: web
    name: partner-lead-portal
    runtime: python
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: ADMIN_AUTH_DISABLED
        value: "1"
      - key: LEAD_DATA_DIR
        value: /data/leads
      - key: LEAD_EXPORT_DIR
        value: /data/exports
    disk:
      name: lead-data
      mountPath: /data
      sizeGB: 1
